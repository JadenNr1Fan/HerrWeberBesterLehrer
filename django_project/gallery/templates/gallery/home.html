<div class="gallery">

    {% for img in images %}
    
    <a href="{{ img.image.url }}" target="_blank">
    
        <img
            src="{{ img.image.url }}"
            style="
                width:150px;
                height:150px;
                object-fit:cover;
                border-radius:10px;
            "
        >
    
    </a>
    
    {% endfor %}
    
    </div>

<script>
    {% for img in images %}

L.marker([
    {{ img.latitude }},
    {{ img.longitude }}
])
.addTo(map)
.bindPopup(`
    <h4>{{ img.title }}</h4>

    <a href="{{ img.image.url }}" target="_blank">

        <img
            src="{{ img.image.url }}"
            style="
                width:150px;
                border-radius:8px;
            "
        >

    </a>
`);

{% endfor %}
</script>
