<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scenery Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            background: #2f5d50;
            color: white;
            text-align: center;
            padding: 20px;
        }

        #map {
            height: 500px;
        }

        .content {
            padding: 20px;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .card {
            background: white;
            padding: 10px;
            border-radius: 10px;
            width: 220px;
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }

        .popup-gallery img {
            width: 140px;
            height: 90px;
            object-fit: cover;
            margin: 5px;
        }
    </style>
</head>
<body>

<header>
    <h1>Scenery Map</h1>
    <p>Please upload only beautiful scenery / landscape pictures.</p>
</header>

<div id="map"></div>

<div class="content">

    <h2>Upload Image</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Upload</button>
    </form>

    <h2>Uploaded Images</h2>

    <div class="gallery">

        {% for img in images %}

        <div class="card">
            <img src="{{ img.image.url }}">
            <p>{{ img.title }}</p>
        </div>

        {% endfor %}

    </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

    var map = L.map('map').setView([46.8182, 8.2275], 7);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: 'OpenStreetMap'
    }).addTo(map);

    var popupContent = `
        <h3>Swiss Sceneries</h3>

        <div class="popup-gallery">

            {% for img in images %}
                <img src="{{ img.image.url }}">
            {% endfor %}

        </div>
    `;

    L.marker([46.8182, 8.2275])
        .addTo(map)
        .bindPopup(popupContent);

</script>

</body>
</html>
