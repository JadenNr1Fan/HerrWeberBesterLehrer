<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scenery Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            background: #2f5d50;
            color: white;
            text-align: center;
            padding: 20px;
        }

        #map {
            height: 500px;
        }

        .content {
            padding: 20px;
        }

        form {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        button {
            background: #2f5d50;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .card {
            background: white;
            padding: 10px;
            border-radius: 10px;
            width: 220px;
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }

        .popup-gallery img {
            width: 140px;
            height: 90px;
            object-fit: cover;
            margin: 5px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<header>
    <h1>Scenery Map</h1>
    <p>Please upload only beautiful scenery / landscape pictures.</p>
</header>

<div id="map"></div>

<div class="content">

    <h2>Upload Image</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Upload</button>
    </form>

    <h2>Uploaded Images</h2>

    <div class="gallery">
        {% for img in images %}
            <div class="card">
                <img src="{{ img.image.url }}">
                <h4>{{ img.title }}</h4>
                <p>{{ img.origin }}</p>
            </div>
        {% endfor %}
    </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    var map = L.map('map').setView([20, 0], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: 'OpenStreetMap'
    }).addTo(map);

    var images = JSON.parse('{{ image_data_json|escapejs }}');

    var groupedImages = {};

    images.forEach(function(img) {
        if (!groupedImages[img.origin]) {
            groupedImages[img.origin] = [];
        }

        groupedImages[img.origin].push(img);
    });

    function addMarkerForPlace(origin, placeImages) {
        fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" + encodeURIComponent(origin))
            .then(response => response.json())
            .then(data => {
                if (data.length === 0) {
                    return;
                }

                var lat = data[0].lat;
                var lon = data[0].lon;

                var popupContent = "<h3>" + origin + "</h3><div class='popup-gallery'>";

                placeImages.forEach(function(img) {
                    popupContent += `
                        <div>
                            <img src="${img.url}">
                            <p>${img.title}</p>
                        </div>
                    `;
                });

                popupContent += "</div>";

                L.marker([lat, lon])
                    .addTo(map)
                    .bindPopup(popupContent);
            });
    }

    Object.keys(groupedImages).forEach(function(origin) {
        addMarkerForPlace(origin, groupedImages[origin]);
    });
</script>

</body>
</html>
